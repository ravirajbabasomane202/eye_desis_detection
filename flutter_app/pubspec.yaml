name: eye_disease_detector
description: AI-powered Eye Disease Detection App

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # HTTP & API
  http: ^1.2.1
  dio: ^5.4.3+1

  # Image handling
  image_picker: ^1.1.2
  image_cropper: ^7.0.0

  # UI
  flutter_animate: ^4.5.0
  lottie: ^3.1.2
  fl_chart: ^0.68.0
  percent_indicator: ^4.2.3
  shimmer: ^3.0.0
  cached_network_image: ^3.3.1
  flutter_svg: ^2.0.10+1

  # Storage & state
  shared_preferences: ^2.2.3
  provider: ^6.1.2

  # Utils
  permission_handler: ^11.3.1
  path_provider: ^2.1.3
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/animations/